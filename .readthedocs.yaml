# .readthedocs.yaml
# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.13"
  commands:
    - pip install uv
    - uv sync --group docs
    - uv run mkdocs build -f docs/mkdocs.yml --site-dir $READTHEDOCS_OUTPUT/html

mkdocs:
  configuration: docs/mkdocs.yml
  fail_on_warning: false

search:
  ranking:
    index.md: 5
    installation.md: 5
    usage.md: 4
    features.md: 3
    api_reference/index.md: 4
    api_reference/**/*: 3
    examples/index.md: 4
    examples/**/*: 3
    architecture.md: 2
    changelog.md: 2
    development.md: 2
    contributing.md: 1
    contributing-docs.md: 1
    license.md: -3
